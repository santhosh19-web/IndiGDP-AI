<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndiGDP AI Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>
</head>

<body onload="if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark-mode');">

    <!-- Abstract Background Graphics -->
    <div class="bg-graphics">
        <div class="graphic g-glow"></div>
        <div class="graphic g-square"></div>
        <div class="graphic g-dots"></div>
        <div class="graphic g-ring"></div>
        <div class="graphic g-ball"></div>
        <div class="graphic g-pill"></div>
        <div class="graphic g-cube"></div>
        <div class="graphic g-pyramid"></div>
        <div class="graphic g-donut"></div>
    </div>

<div class="app-layout fade-in">

    <!---------------- SIDEBAR ---------------->
    <div class="sidebar bento-card">
        <h3 id="sidebarName">IndiGDP AI</h3>
        <a href="/dashboard"><button class="nav-btn btn-haptic active">Dashboard</button></a>
        <a href="/history"><button class="nav-btn btn-haptic">History</button></a>
        <a href="/settings"><button class="nav-btn btn-haptic">Settings</button></a>
    </div>

    <!---------------- MAIN AREA ---------------->
    <div class="main-area">

        <!------ KPI CARDS ------>
        <div class="kpi-row">
            <div class="bento-card kpi-card btn-haptic">
                <h4>System Status</h4>
                <p id="status">Ready</p>
            </div>
            <div class="bento-card kpi-card btn-haptic">
                <h4>Core Engine</h4>
                <p>Random Forest</p>
            </div>
            <div class="bento-card kpi-card btn-haptic">
                <h4>Accuracy</h4>
                <p>94%</p>
            </div>
            <div class="bento-card kpi-card btn-haptic">
                <h4>Market Pulse</h4>
                <p id="marketSentiment">Stable</p>
            </div>
        </div>

        <!------ INPUT PANEL ------>
        <div class="bento-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; font-size: 18px;">Input Economic Parameters</h3>
                <button class="sync-btn btn-haptic" onclick="syncMarketData()" id="syncBtn">
                    <span id="syncIcon">🔄</span> Sync Market Data
                </button>
            </div>

            <div class="input-panel">
                <div class="slider-box">
                    <div class="slider-header">
                        <label>Inflation (%) <span id="inflationValue">5.00</span></label>
                        <span id="inflationTrend" class="trend-hint"></span>
                    </div>
                    <div class="sparkline-container"><canvas id="inflationSparkline"></canvas></div>
                    <input type="range" min="0" max="30" step="0.1" value="5" id="inflation">
                </div>
                <div class="slider-box">
                    <div class="slider-header">
                        <label>Population (B) <span id="populationValue">1.40</span></label>
                        <span id="populationTrend" class="trend-hint"></span>
                    </div>
                    <div class="sparkline-container"><canvas id="populationSparkline"></canvas></div>
                    <input type="range" min="0.5" max="2.5" step="0.01" value="1.4" id="population">
                </div>
                <div class="slider-box">
                    <div class="slider-header">
                        <label>Exports ($B) <span id="exportsValue">400.00</span></label>
                        <span id="exportsTrend" class="trend-hint"></span>
                    </div>
                    <div class="sparkline-container"><canvas id="exportsSparkline"></canvas></div>
                    <input type="range" min="5" max="1500" step="1" value="400" id="exports">
                </div>
                <div class="slider-box">
                    <div class="slider-header">
                        <label>Imports ($B) <span id="importsValue">500.00</span></label>
                        <span id="importsTrend" class="trend-hint"></span>
                    </div>
                    <div class="sparkline-container"><canvas id="importsSparkline"></canvas></div>
                    <input type="range" min="10" max="1500" step="1" value="500" id="imports">
                </div>
                <div class="slider-box">
                    <div class="slider-header">
                        <label>FDI ($B) <span id="fdiValue">50.00</span></label>
                        <span id="fdiTrend" class="trend-hint"></span>
                    </div>
                    <div class="sparkline-container"><canvas id="fdiSparkline"></canvas></div>
                    <input type="range" min="0" max="300" step="0.1" value="50" id="fdi">
                </div>
                <div class="slider-box">
                    <div class="slider-header">
                        <label>Savings (%) <span id="savingsValue">30.00</span></label>
                        <span id="savingsTrend" class="trend-hint"></span>
                    </div>
                    <div class="sparkline-container"><canvas id="savingsSparkline"></canvas></div>
                    <input type="range" min="10" max="80" step="0.1" value="30" id="savings">
                </div>
            </div>
            
            <div style="margin-top: 20px;">
                <button class="predict-btn btn-haptic" onclick="predictGDP()">Run Prediction Computing</button>
            </div>
            
            <div id="loader" class="loader" style="display:none"></div>
            
            <div id="resultBox" style="margin-top: 15px;"></div>
        </div>

        <!------ CHART ------>
        <div class="bento-card chart-panel" style="position: relative;">
            <div id="chartPlaceholder" class="chart-placeholder">
                <div class="placeholder-overlay">
                    <div class="placeholder-bars">
                        <div class="bar" style="--h: 40px; --d: 0s;"></div>
                        <div class="bar" style="--h: 80px; --d: 0.2s;"></div>
                        <div class="bar" style="--h: 60px; --d: 0.4s;"></div>
                        <div class="bar" style="--h: 100px; --d: 0.6s;"></div>
                        <div class="bar" style="--h: 70px; --d: 0.8s;"></div>
                    </div>
                    <p>Awaiting Data Analysis...</p>
                </div>
            </div>
            <canvas id="gdpChart" style="display: none;"></canvas>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/validation.js') }}"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/effects.js') }}"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('autorun') === 'true') {
            const sliders = ['inflation', 'population', 'exports', 'imports', 'fdi', 'savings'];
            sliders.forEach(id => {
                const val = urlParams.get(id);
                if (val) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.value = val;
                        // update label span natively
                        const output = document.getElementById(id + "Value");
                        if (output) output.innerHTML = val;
                    }
                }
            });
            // small delay to let chart.js load fully if needed, then execute prediction
            setTimeout(() => {
                if (typeof predictGDP === 'function') {
                    predictGDP();
                }
            }, 100);
        }
    });
</script>

</body>
</html>
