<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IndiGDP AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Poppins', sans-serif;
        }

        .glass-card {
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            color: white;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #00ffcc;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <h1>IndiGDP AI</h1>
        <p>Smart GDP Prediction Platform</p>

        <a href="/dashboard">
            <button>Open Dashboard</button>
        </a>
    </div>

</body>
</html>
